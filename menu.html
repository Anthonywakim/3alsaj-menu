<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>3al Saj | Menu</title>
  <meta name="description" content="3al Saj Lebanese Kiosque menu - saj, pizza, mezza, appetizers, desserts and drinks. English and Arabic." />
  <meta name="theme-color" content="#fbf1d6" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Lato:wght@400;700;900&family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #fbf1d6;
      --cream-2: #f5e7c4;
      --paper: #fffaf0;
      --sand: #c89a5c;
      --gold: #b9893f;

      --red: #9a1419;
      --red-bright: #d71920;
      --red-dark: #6f0d12;

      --green: #1f6b38;
      --ink: #2a1206;
      --ink-soft: #5c3a23;

      --wood-1: #e7c891;
      --wood-2: #d2a868;
      --wood-3: #b98a48;

      --line: rgba(154, 20, 25, 0.5);
      --line-soft: rgba(154, 20, 25, 0.22);

      --hd-en: 'Cinzel', serif;
      --hd-ar: 'Amiri', 'Cinzel', serif;
      --bd-en: 'Lato', Arial, sans-serif;
      --bd-ar: 'Cairo', 'Lato', sans-serif;

      --hd: var(--hd-en);
      --bd: var(--bd-en);
    }

    html[lang="ar"] {
      --hd: var(--hd-ar);
      --bd: var(--bd-ar);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      min-height: 100svh;
      font-family: var(--bd);
      color: var(--ink);
      background:
        radial-gradient(circle at 22% 8%, rgba(255, 255, 255, 0.7), transparent 40%),
        radial-gradient(circle at 82% 96%, rgba(201, 154, 92, 0.18), transparent 46%),
        linear-gradient(180deg, var(--paper), var(--cream) 40%, var(--cream-2));
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.05;
      background-image:
        radial-gradient(circle at 30% 30%, rgba(154, 20, 25, 0.6) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 70%, rgba(184, 137, 63, 0.6) 0 2px, transparent 3px);
      background-size: 120px 120px, 120px 120px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px max(14px, env(safe-area-inset-left)) 11px max(14px, env(safe-area-inset-right));
      background: linear-gradient(180deg, rgba(33, 14, 6, 0.97), rgba(24, 10, 4, 0.96));
      border-bottom: 2px solid var(--gold);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.32);
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--cream);
      text-decoration: none;
      font-family: var(--hd);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      padding: 8px 10px;
      border: 1px solid rgba(232, 207, 154, 0.4);
      border-radius: 999px;
      background: rgba(255, 247, 223, 0.06);
      transition: background 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .home-link:hover { background: rgba(255, 247, 223, 0.13); border-color: rgba(255, 232, 179, 0.8); }

    .brand {
      font-family: var(--hd);
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: 1.4px;
      color: var(--cream);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .brand .cedar { color: var(--green); font-size: 1.05rem; }
    html[lang="ar"] .brand { letter-spacing: 0; font-size: 1.3rem; }

    .lang {
      display: inline-flex;
      border: 1px solid rgba(232, 207, 154, 0.5);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 247, 223, 0.06);
      flex: none;
    }
    .lang button {
      appearance: none;
      border: 0;
      cursor: pointer;
      padding: 8px 12px;
      font-family: 'Cinzel', serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--cream);
      background: transparent;
      transition: background 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .lang button.ar-label { font-family: 'Cairo', sans-serif; font-size: 0.78rem; }
    .lang button[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--red-bright), var(--red-dark));
      color: #fff;
    }

    .chips {
      position: sticky;
      top: 56px;
      z-index: 25;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 14px;
      background: linear-gradient(180deg, rgba(251, 241, 214, 0.97), rgba(251, 241, 214, 0.82));
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(6px);
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: none;
      cursor: pointer;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--red);
      font-family: var(--hd);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      padding: 7px 13px;
      border-radius: 999px;
      white-space: nowrap;
      transition: background 0.15s ease, color 0.15s ease, transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    html[lang="ar"] .chip { font-size: 0.78rem; letter-spacing: 0; }
    .chip:hover { transform: translateY(-1px); }
    .chip.active { background: linear-gradient(135deg, var(--red-bright), var(--red-dark)); color: #fff; border-color: var(--red-dark); }

    .page {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px max(14px, env(safe-area-inset-left)) 60px max(14px, env(safe-area-inset-right));
    }

    .hero {
      text-align: center;
      padding: 18px 10px 6px;
    }
    .hero .ar-logo {
      font-family: 'Amiri', serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }
    .hero .en-logo {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--ink-soft);
      margin-top: 2px;
    }
    .hero .tag {
      margin-top: 10px;
      font-family: var(--hd);
      font-size: 0.66rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
    }
    html[lang="ar"] .hero .tag { letter-spacing: 1px; }

    section.menu-sec {
      position: relative;
      margin-top: 26px;
      padding: 26px 18px 24px;
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.7), rgba(255, 250, 240, 0.25));
      border: 1.5px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 26px rgba(120, 70, 20, 0.1), inset 0 0 0 4px rgba(255, 250, 240, 0.5);
      scroll-margin-top: 108px;
    }
    section.menu-sec::before,
    section.menu-sec::after {
      content: '\2756';
      position: absolute;
      color: var(--gold);
      font-size: 0.8rem;
      opacity: 0.9;
    }
    section.menu-sec::before { top: 8px; left: 12px; }
    section.menu-sec::after  { top: 8px; right: 12px; }

    .sec-head { text-align: center; margin-bottom: 20px; }
    .sec-title {
      font-family: var(--hd);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--ink);
      text-transform: uppercase;
      line-height: 1.05;
    }
    html[lang="ar"] .sec-title { font-size: 2.4rem; letter-spacing: 0; }
    .sec-sub {
      margin-top: 4px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--ink-soft);
    }
    .flourish {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 9px auto 0;
      width: min(80%, 280px);
      color: var(--gold);
    }
    .flourish::before, .flourish::after {
      content: '';
      height: 1px; flex: 1;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .grp-label {
      font-family: var(--hd);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2.2px;
      text-transform: uppercase;
      color: var(--red);
      margin: 18px 0 8px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .grp-label::after { content: ''; height: 1px; flex: 1; background: var(--line-soft); }
    html[lang="ar"] .grp-label { letter-spacing: 0; font-size: 0.92rem; }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 14px;
      align-items: baseline;
      padding: 11px 2px;
      border-bottom: 1px dotted var(--line-soft);
    }
    .item:last-child { border-bottom: 0; }
    .item .name {
      font-family: var(--hd);
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      color: var(--ink);
      text-transform: uppercase;
    }
    html[lang="ar"] .item .name { font-size: 1.25rem; letter-spacing: 0; font-weight: 700; }
    .item .price {
      font-family: var(--bd-en);
      font-size: 1.04rem;
      font-weight: 900;
      color: var(--red-bright);
      white-space: nowrap;
      justify-self: end;
    }
    .item .desc {
      grid-column: 1 / 2;
      font-size: 0.82rem;
      line-height: 1.45;
      color: var(--ink-soft);
      font-weight: 400;
      max-width: 52ch;
    }
    html[lang="ar"] .item .desc { font-size: 0.92rem; }

    .photo {
      position: relative;
      margin: 16px 0 6px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--wood-2);
      background:
        repeating-linear-gradient(92deg, rgba(120, 74, 28, 0.10) 0 1px, transparent 1px 8px),
        linear-gradient(135deg, var(--wood-1), var(--wood-2) 55%, var(--wood-3));
      box-shadow: 0 8px 20px rgba(120, 70, 20, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.5);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
    }
    .photo img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo .ph {
      text-align: center;
      color: rgba(67, 38, 12, 0.7);
      padding: 12px;
    }
    .photo .ph .ic { font-size: 1.7rem; display: block; margin-bottom: 6px; opacity: 0.7; }
    .photo .ph .lbl {
      font-family: var(--hd);
      font-size: 0.66rem;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .photo .ph .file {
      display: block;
      margin-top: 5px;
      font-family: var(--bd-en);
      font-size: 0.64rem;
      letter-spacing: 0.3px;
      color: rgba(67, 38, 12, 0.6);
    }
    html[lang="ar"] .photo .ph .lbl { letter-spacing: 0; font-size: 0.82rem; }
    .photo.filled .ph { display: none; }

    .drinks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 26px;
    }
    .drink {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 2px;
      border-bottom: 1px dotted var(--line-soft);
    }
    .drink .dn {
      font-family: var(--hd);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--ink);
    }
    html[lang="ar"] .drink .dn { font-size: 1.08rem; letter-spacing: 0; }
    .drink .dp {
      font-family: var(--bd-en);
      font-weight: 900;
      color: var(--red-bright);
      white-space: nowrap;
    }
    .note {
      text-align: center;
      margin: 16px 0 4px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--red);
    }
    @media (max-width: 520px) {
      .drinks-grid { grid-template-columns: 1fr; gap: 0; }
    }

    .footer {
      text-align: center;
      margin-top: 34px;
      color: var(--ink-soft);
    }
    .footer .contact {
      font-family: var(--bd-en);
      font-weight: 900;
      font-size: 1rem;
      color: var(--red);
      letter-spacing: 0.3px;
    }
    .footer .contact a { color: var(--red); text-decoration: none; }
    .footer .contact a:hover { text-decoration: underline; text-underline-offset: 3px; }
    .footer .addr {
      margin-top: 7px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.02rem;
      color: var(--ink-soft);
    }
    .footer .cr {
      margin-top: 16px;
      font-family: var(--hd);
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }

    @media (max-width: 380px) {
      .sec-title { font-size: 1.65rem; }
      html[lang="ar"] .sec-title { font-size: 2rem; }
      .brand { font-size: 0.9rem; }
      .home-link span.txt { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; scroll-behavior: auto !important; }
    }
    html { scroll-behavior: smooth; }
  </style>
</head>

          { label: { en: 'Kawarma & Pepperoni', ar: 'قاورما وبيبروني' }, photo: 'saj-kawarma', items: [

      {
        id: 'saj-extra', title: { en: 'Saj Extra', ar: 'صاج إكسترا' },
        groups: [

    let lang = 'en';
    const root = document.getElementById('menuRoot');
    const chipNav = document.getElementById('chipNav');

    function el(tag, cls, html) {
      const n = document.createElement(tag);
      if (cls) n.className = cls;
      if (html != null) n.innerHTML = html;
      return n;
    }

    function photoBlock(slot) {
      const fig = el('figure', 'photo');
      const img = document.createElement('img');
      img.alt = '';
      img.loading = 'lazy';
      img.src = slot + '.jpg';
      img.addEventListener('load', () => fig.classList.add('filled'));
      img.addEventListener('error', () => { img.style.display = 'none'; fig.classList.remove('filled'); });
      const ph = el('div', 'ph',
        '<span class="ic" aria-hidden="true">&#128247;</span>' +
        '<span class="lbl">' + T.photo[lang] + '</span>' +
        '<span class="file">' + slot + '.jpg</span>');
      fig.appendChild(img);
      fig.appendChild(ph);
      return fig;
    }

    function render() {
      root.innerHTML = '';
      chipNav.innerHTML = '';

      MENU.forEach(sec => {
        const chip = el('button', 'chip', sec.title[lang]);
        chip.dataset.target = sec.id;
        chip.addEventListener('click', () => {
          document.getElementById(sec.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        chipNav.appendChild(chip);

        const s = el('section', 'menu-sec');
        s.id = sec.id;

        const head = el('div', 'sec-head');
        head.appendChild(el('div', 'sec-title', sec.title[lang]));
        if (sec.sub) head.appendChild(el('div', 'sec-sub', sec.sub[lang]));
        head.appendChild(el('div', 'flourish', '<span aria-hidden="true">&#10022;</span>'));
        s.appendChild(head);

        if (sec.drinks) {
          const grid = el('div', 'drinks-grid');
          sec.drinks.forEach(d => {
            const row = el('div', 'drink');
            row.appendChild(el('span', 'dn', d.n[lang]));
            row.appendChild(el('span', 'dp', d.p));
            grid.appendChild(row);
          });
          s.appendChild(grid);
          if (sec.note) s.appendChild(el('div', 'note', '\u2014 ' + sec.note[lang] + ' \u2014'));
          root.appendChild(s);
          return;
        }

        sec.groups.forEach(g => {
          if (g.label) s.appendChild(el('div', 'grp-label', g.label[lang]));
          g.items.forEach(it => {
            const row = el('div', 'item');
            row.appendChild(el('div', 'name', it.n[lang]));
            row.appendChild(el('div', 'price', it.p));
            row.appendChild(el('div', 'desc', it.d[lang]));
            s.appendChild(row);
          });
          if (g.photo) s.appendChild(photoBlock(g.photo));
        });

        root.appendChild(s);
      });

      document.querySelectorAll('[data-i18n]').forEach(n => {
        const k = n.getAttribute('data-i18n');
        if (T[k]) n.textContent = T[k][lang];
      });

      setupScrollSpy();
    }

    function setLang(l) {
      lang = l;
      document.documentElement.lang = l;
      document.documentElement.dir = (l === 'ar') ? 'rtl' : 'ltr';
      document.getElementById('btnEn').setAttribute('aria-pressed', l === 'en');
      document.getElementById('btnAr').setAttribute('aria-pressed', l === 'ar');
      document.getElementById('brandText').textContent = (l === 'ar') ? 'عَ الصاج' : '3AL SAJ';
      render();
    }

    let spyObserver;
    function setupScrollSpy() {
      if (typeof IntersectionObserver === 'undefined') return;
      if (spyObserver) spyObserver.disconnect();
      const chips = [...chipNav.querySelectorAll('.chip')];
      spyObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const id = e.target.id;
            chips.forEach(c => c.classList.toggle('active', c.dataset.target === id));
            const active = chips.find(c => c.dataset.target === id);
            if (active) active.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
          }
        });
      }, { rootMargin: '-120px 0px -65% 0px', threshold: 0 });
      MENU.forEach(sec => { const n = document.getElementById(sec.id); if (n) spyObserver.observe(n); });
    }

    (function init() {
      setLang('en');
    })();
  </script>
