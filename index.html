<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>3al Saj | Lebanese Kiosque</title>
  <meta name="description" content="3al Saj Lebanese Kiosque in Qlayaat, Mount Lebanon - view the menu, location, Google reviews, and Instagram." />
  <meta property="og:title" content="3al Saj | Lebanese Kiosque" />
  <meta property="og:description" content="Fresh saj, Lebanese flavors, and daily favorites in Qlayaat, Mount Lebanon." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #fff7df;
      --cream-soft: #f5e8c8;
      --sand: #e8cf9a;
      --wood: #4b2415;
      --wood-dark: #241006;
      --red: #d71920;
      --red-dark: #8e1116;
      --green: #1f6b38;
      --green-soft: #9cb66e;
      --ink: #160805;
      --border: rgba(255, 214, 137, 0.42);
      --shadow: rgba(0, 0, 0, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background: var(--ink);
      color: var(--cream);
      font-family: 'Lato', Arial, sans-serif;
    }

    body {
      min-height: 100svh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 247, 223, 0.12), transparent 32%),
        radial-gradient(circle at 0% 100%, rgba(31, 107, 56, 0.22), transparent 36%),
        radial-gradient(circle at 100% 85%, rgba(215, 25, 32, 0.18), transparent 34%),
        linear-gradient(180deg, #2c1008 0%, #160704 55%, #090201 100%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(30deg, rgba(255, 255, 255, 0.07) 12%, transparent 12.5%, transparent 87%, rgba(255, 255, 255, 0.07) 87.5%, rgba(255, 255, 255, 0.07)),
        linear-gradient(150deg, rgba(255, 255, 255, 0.07) 12%, transparent 12.5%, transparent 87%, rgba(255, 255, 255, 0.07) 87.5%, rgba(255, 255, 255, 0.07));
      background-size: 44px 76px;
      background-position: 0 0, 0 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
    }

    .card {
      position: relative;
      width: min(100%, 430px);
      min-height: min(690px, calc(100svh - 36px));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px 20px 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(75, 36, 21, 0.92), rgba(36, 16, 6, 0.94)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 14px);
      box-shadow: 0 28px 74px var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 92px;
      background:
        repeating-linear-gradient(90deg,
          var(--red) 0 34px,
          var(--red) 34px 36px,
          var(--cream) 36px 70px,
          var(--cream) 70px 72px);
      box-shadow: 0 11px 24px rgba(0, 0, 0, 0.28);
    }

    .card::after {
      content: '';
      position: absolute;
      top: 70px;
      left: -14px;
      right: -14px;
      height: 35px;
      background:
        radial-gradient(circle at 18px -2px, var(--cream) 0 18px, transparent 19px) 0 0 / 72px 35px repeat-x,
        radial-gradient(circle at 18px -2px, var(--red) 0 18px, transparent 19px) 36px 0 / 72px 35px repeat-x;
      filter: drop-shadow(0 9px 10px rgba(0, 0, 0, 0.25));
    }

    .inner-border {
      position: absolute;
      inset: 118px 14px 14px;
      border: 1px solid rgba(255, 214, 137, 0.22);
      border-radius: 22px;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 42px;
      height: 42px;
      border-color: var(--sand);
      border-style: solid;
      opacity: 0.58;
      pointer-events: none;
      z-index: 2;
    }

    .tl { top: 126px; left: 24px; border-width: 2px 0 0 2px; border-top-left-radius: 10px; }
    .tr { top: 126px; right: 24px; border-width: 2px 2px 0 0; border-top-right-radius: 10px; }
    .bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; border-bottom-left-radius: 10px; }
    .br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; border-bottom-right-radius: 10px; }

    .content {
      position: relative;
      z-index: 3;
      width: 100%;
      text-align: center;
      padding: 86px 8px 8px;
    }

    .kiosk-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 14px;
      border: 1px solid rgba(232, 207, 154, 0.42);
      border-radius: 999px;
      background: rgba(255, 247, 223, 0.08);
      color: var(--cream-soft);
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .brand h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3.25rem, 18vw, 5.25rem);
      line-height: 0.9;
      font-weight: 700;
      color: var(--cream);
      text-shadow: 0 3px 16px rgba(255, 247, 223, 0.14);
      direction: rtl;
    }

    .brand .en {
      display: block;
      margin-top: 6px;
      font-family: 'Cinzel', serif;
      font-size: clamp(1.55rem, 8.2vw, 2.32rem);
      line-height: 1;
      letter-spacing: 2px;
      font-weight: 700;
      color: var(--red);
      text-shadow: 0 0 15px rgba(215, 25, 32, 0.34);
    }

    .subtitle {
      margin-top: 12px;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 4.2px;
      text-transform: uppercase;
      color: var(--cream-soft);
      opacity: 0.95;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      width: min(100%, 290px);
      margin: 20px auto 18px;
      color: var(--green-soft);
      font-size: 1.16rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, transparent, var(--sand), transparent);
      opacity: 0.75;
    }

    .info {
      max-width: 330px;
      margin: 0 auto 23px;
      color: var(--cream-soft);
      font-size: 0.95rem;
      line-height: 1.62;
    }

    .info p {
      margin-bottom: 6px;
    }

    .info a {
      color: inherit;
      text-decoration: none;
      font-weight: 900;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      width: 100%;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 16px;
      border-radius: 15px;
      border: 1px solid rgba(232, 207, 154, 0.42);
      background:
        linear-gradient(180deg, rgba(255, 247, 223, 0.09), rgba(255, 247, 223, 0.035));
      color: var(--sand);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.9px;
      text-transform: uppercase;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 247, 223, 0.12);
      border-color: rgba(255, 232, 179, 0.86);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
    }

    .btn-menu {
      color: var(--cream);
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      border-color: rgba(255, 232, 179, 0.72);
      box-shadow: 0 11px 30px rgba(215, 25, 32, 0.25);
    }

    .btn-menu:hover {
      background: linear-gradient(135deg, #ef252d, #9d1118);
      border-color: rgba(255, 232, 179, 0.95);
    }

    .footer {
      margin-top: 22px;
      font-family: 'Cinzel', serif;
      color: var(--cream-soft);
      opacity: 0.62;
      font-size: 0.6rem;
      letter-spacing: 2.2px;
      text-transform: uppercase;
    }

    @media (min-width: 480px) {
      .buttons {
        grid-template-columns: 1fr 1fr;
      }

      .btn-menu {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 360px) {
      .wrap {
        padding-left: 10px;
        padding-right: 10px;
      }

      .card {
        padding: 30px 14px 22px;
        min-height: calc(100svh - 24px);
      }

      .content {
        padding-top: 82px;
      }

      .brand h1 {
        font-size: 3.08rem;
      }

      .brand .en {
        font-size: 1.48rem;
      }

      .kiosk-label {
        font-size: 0.61rem;
        letter-spacing: 1.5px;
      }

      .btn {
        min-height: 49px;
        font-size: 0.68rem;
        letter-spacing: 1.45px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="3al Saj quick links">
      <span class="inner-border"></span>
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>

      <div class="content">
        <div class="kiosk-label">Lebanese Kiosque</div>

        <div class="brand">
          <h1>عال صاج</h1>
          <span class="en">3al Saj</span>
          <p class="subtitle">Fresh Saj • Daily Bites</p>
        </div>

        <div class="divider" aria-hidden="true">🌲</div>

        <div class="info">
          <p>📍 Qlayaat Main Road - Facing Centre Mi-Chemin</p>
          <p>📞 <a href="tel:+96176910929">76 910 929</a> — <a href="tel:+9613347692">03 347 692</a></p>
        </div>

        <nav class="buttons" aria-label="Restaurant links">
          <a class="btn btn-menu" href="3al_Saj_Menu.pdf" target="_blank" rel="noopener noreferrer">📖 View Menu</a>
          <a class="btn" href="https://www.google.com/maps/place/3al+Saj/@33.9779401,35.7081471,17z/data=!4m8!3m7!1s0x151f47f4eac5e40f:0x9f32a6e4c3b2332f!8m2!3d33.9779401!4d35.7081471!9m1!1b1!16s%2Fg%2F11sxwrz71b?entry=ttu" target="_blank" rel="noopener noreferrer">⭐ Google Reviews</a>
          <a class="btn" href="https://www.google.com/maps/place/3al+Saj/@33.9779401,35.7081471,17z/data=!4m6!3m5!1s0x151f47f4eac5e40f:0x9f32a6e4c3b2332f!8m2!3d33.9779401!4d35.7081471!16s%2Fg%2F11sxwrz71b?entry=ttu" target="_blank" rel="noopener noreferrer">📍 Location</a>
          <a class="btn" href="https://www.instagram.com/3al_saj/?hl=en" target="_blank" rel="noopener noreferrer">📸 Instagram</a>
        </nav>

        <p class="footer">3al Saj - Qlayaat, Mount Lebanon</p>
      </div>
    </section>
  </main>
</body>
</html>
